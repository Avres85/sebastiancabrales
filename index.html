<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sebastian | Cube Reveal MVP</title>
    <style>
      body {
        background: #020306;
      }

      #gl-canvas,
      #fallback-canvas,
      #poster,
      #static-fallback,
      #content {
        opacity: 0;
        visibility: hidden;
      }
    </style>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <section id="intro" class="intro" aria-label="Opening logo animation">
      <div class="sticky-shell">
        <button
          id="skip-intro"
          class="skip-intro"
          aria-label="Skip logo animation and show Sebastian wordmark"
        >
          Skip animation
        </button>

        <div id="poster" class="poster" aria-hidden="true">
          <div class="poster-noise"></div>
          <div class="poster-wordmark">
            <svg
              id="poster-wordmark-svg"
              class="wordmark-svg"
              role="presentation"
              aria-hidden="true"
            ></svg>
          </div>
        </div>

        <canvas id="gl-canvas" class="scene-canvas" aria-hidden="true"></canvas>
        <canvas id="fallback-canvas" class="scene-canvas" aria-hidden="true"></canvas>

        <div id="static-fallback" class="static-fallback" aria-hidden="true">
          <svg
            id="static-wordmark-svg"
            class="wordmark-svg"
            role="presentation"
            aria-hidden="true"
          ></svg>
        </div>
      </div>
    </section>

    <main id="content" class="content">
      <section class="panel">
        <p class="eyebrow">Portfolio</p>
        <h1>Sebastian</h1>
        <p class="identity-line">CS + Applied Math at UC Berkeley</p>
      </section>

      <section class="media-section" aria-label="Favorite movie scenes">
        <p class="eyebrow">Favorite Movie Scenes</p>
        <div class="media-grid">
          <figure class="media-card">
            <img
              src="./main_page_graphics/finalrotfdropin.gif"
              alt="Favorite movie scene 1"
              loading="lazy"
              decoding="async"
            />
          </figure>
          <figure class="media-card">
            <img
              src="./main_page_graphics/finaldinobotcharge.gif"
              alt="Favorite movie scene 2"
              loading="lazy"
              decoding="async"
            />
          </figure>
          <figure class="media-card">
            <img
              src="./main_page_graphics/finaltimetofindout.gif"
              alt="Favorite movie scene 3"
              loading="lazy"
              decoding="async"
            />
          </figure>
        </div>
      </section>

      <section class="panel projects-panel" aria-label="Projects">
        <p class="tech-title">Under Construction</p>
      </section>

      <section class="panel resume-panel">
        <a class="resume-link" href="./Sebastian%20--%20Curr%20Res-15.pdf" download>
          My Resume
        </a>
      </section>
    </main>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
